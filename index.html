<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Visual Toy-Box.</title>
<style>
  :root {
    color-scheme: light;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    position: relative;
    width: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background: #fff;
  }

  /* ---------- オープニング画面 ---------- */
  .opening {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: transform 1s ease-in;
    z-index: 10;
  }

  .opening img {
    width: 200px;
    height: auto;
    opacity: 0;
    animation: fadeInLogo 0.8s ease-in forwards;
    animation-delay: 0.3s;
  }

  @keyframes fadeInLogo {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .opening svg {
    margin-top: 10px;
    width: 70%;
    max-width: 640px;
    min-width: 300px;
    height: auto;
  }
  .opening .ttlColor0 {
    fill: #543032;
    opacity: 0;
    animation: fadeInLogo 0.8s ease-in forwards;
    animation-delay: 0.3s;
  }

  .opening p {
    color: #543032;
    font-size: 1.2rem;
    opacity: 0;
    animation: fadeInLogo 0.8s ease-in forwards;
    animation-delay: 0.3s;
  }

  @media screen and (min-width:912px) {
    .opening p {
      margin-top: 4px;
    }
  }

  /* スライドアップ用のクラス（JSで付与） */
  .opening.slide-up {
    transform: translateY(-100%);
  }

/* ---------- 選択画面（部屋） ---------- */
  .main-screen {
    width: 100%;
    height: 100%;
    background: #b75252;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }


  /* 部屋の画像エリア */
  .scene {
    width: 100%;
    max-width: 880px;
    margin: 16px auto 0;
    line-height: 0;
  }

  .scene .gelatinRoom {
    min-width: 300px;
    margin: 0 auto;
    display: block;
  }

  @media screen and (max-width:880px) {
    .scene .gelatinRoom {
      width: 90%;
    }
  }
  @media screen and (min-width:880px) and (max-width:980px) {
    .scene .gelatinRoom {
      width: 95%;
    }
  }

  .scene img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* メッセージボックス */
  .message-box {
    position: relative;
    width: 90%;
    max-width: 880px;
    margin: 16px auto;
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    min-height: 160px;
    color: #7a3b3b;
    font-size: 18px;
    line-height: 1.8;
    white-space: pre-wrap;
  }

  #messageText {
    position: absolute;
    top: 0;
    padding: 1em;
  }

  /* SHOP・ORDERボタン */
  .menu {
    width: 90%;
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    justify-content: space-around;
    /* margin-top: auto; */
    /* padding: 32px 0; */
  }

  .menu button {
    background: none;
    border: none;
    color: #fff;
    font-size: 20px;
    letter-spacing: 4px;
    cursor: pointer;
  }</style>
</head>

  <!-- 選択画面（部屋） -->
  <div class="main-screen">

    <!-- 部屋の画像 -->
    <div class="scene">
      <img class="gelatinRoom" src="cmnImg/gelatinRoom.svg" alt="お部屋">
    </div>

    <!-- メッセージボックス -->
    <div class="message-box">
      <p id="messageText"></p>
    </div>

    <!-- SHOP・ORDERボタン -->
    <div class="menu">
      <button>SHOP</button>
      <button>ORDER</button>
    </div>

  </div>

  <script>
    // 1文字ずつコマ送りで表示する関数
    function typeText(el, text, speed = 60) {
      let i = 0;
      el.textContent = '';
      function step() {
        if (i < text.length) {
          el.textContent += text[i];
          i++;
          setTimeout(step, speed);
        }
      }
      step();
    }
    window.addEventListener('load', () => {
      const opening = document.getElementById('opening');

      // 画像が出きったあと、2秒待ってからスライドアップ
      setTimeout(() => {
        opening.classList.add('slide-up');
      }, 2000);

      // スライド完了後、非表示にして裏に隠す
      opening.addEventListener('transitionend', () => {
        opening.style.display = 'none';

      // オープニングが終わったらメッセージをコマ送り表示
        const message = document.getElementById('messageText');
        typeText(message, '「いらっしゃいませ〜！\n来てくれてありがとう！」', 60);
      });
    });
  </script>
