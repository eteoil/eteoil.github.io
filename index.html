<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Visual Toy-Box.</title>
<style>
  :root {
    color-scheme: light;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    position: relative;
    width: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background: #fff;
  }

  /* ---------- オープニング画面 ---------- */
  .opening {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: transform 1s ease-in;
    z-index: 10;
  }

  .opening img {
    width: 200px;
    height: auto;
    opacity: 0;
    animation: fadeInLogo 0.8s ease-in forwards;
  }

  @keyframes fadeInLogo {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .opening p {
    margin-top: 16px;
    color: #888;
    font-size: 1rem;
    opacity: 0;
    animation: fadeInLogo 0.8s ease-in forwards;
    animation-delay: 0.3s;
  }

  /* スライドアップ用のクラス（JSで付与） */
  .opening.slide-up {
    transform: translateY(-100%);
  }

  /* ---------- 選択画面（部屋） ---------- */
  .main-screen {
    width: 100%;
    height: 100%;
    background: #b75252;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .main-screen h1 {
    color: #fff;
    margin-bottom: 24px;
  }

  .buttons {
    display: flex;
    gap: 40px;
  }

  .buttons button {
    padding: 10px 24px;
    font-size: 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    background: #fff;
    color: #b75252;
  }
</style>
</head>
<body>

  <!-- オープニング -->
  <div id="opening" class="opening">
    <img src="img\vtb_logo.png" alt="ロゴ">
    <svg>
      <use href="img\title.svg"></use>
    </svg>
    <p>Presented by eteoil</p>
  </div>

  <!-- 選択画面（部屋） -->
  <div class="main-screen">
    <h1>お部屋</h1>
    <div class="buttons">
      <button>SHOP</button>
      <button>ORDER</button>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const opening = document.getElementById('opening');

      // 画像が出きったあと、2秒待ってからスライドアップ
      setTimeout(() => {
        opening.classList.add('slide-up');
      }, 2000);

      // スライド完了後、非表示にして裏に隠す
      opening.addEventListener('transitionend', () => {
        opening.style.display = 'none';
      });
    });
  </script>

</body>
</html>
